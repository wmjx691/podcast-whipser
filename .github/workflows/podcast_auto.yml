name: Auto Transcribe Podcast and Upload to Drive

# Define trigger events
on:
  # 1. Allow manual trigger from the GitHub Actions tab (useful for testing)
  workflow_dispatch: 
  
  # 2. Scheduled trigger (Cron Job)
  schedule:
    # 02:00 UTC corresponds to 10:00 AM CST (Taiwan Time)
    # 1,4 means it runs every Monday (1) and Thursday (4)
    - cron: '0 2 * * 1,4'

jobs:
  transcribe_and_upload:
    runs-on: ubuntu-latest # Use the latest Ubuntu virtual machine
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Cache pip dependencies to speed up future runs

    - name: 🛠️ Install System Dependencies (FFmpeg)
      # Whisper requires FFmpeg for audio processing
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 📦 Install Python Dependencies
      run: |
        pip install -r requirements.txt

    - name: 🔑 Prepare Environment Variables and Credentials
      # Map GitHub Secrets to environment variables and files for the runner
      env:
        GCP_TOKEN: ${{ secrets.GCP_TOKEN_JSON }}
      run: |
        # Create .env file for the target Google Drive Folder ID
        echo "DRIVE_FOLDER_ID=${{ secrets.DRIVE_FOLDER_ID }}" > .env
        
        # Create token.json for Google API OAuth authentication
        echo "$GCP_TOKEN" > token.json

    - name: 🚀 Run Main Pipeline (Download, Transcribe, Upload)
      run: |
        python src/main.py